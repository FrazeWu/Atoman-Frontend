name: Frontend CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14
    - name: Install dependencies
      run: bun install --frozen-lockfile
    - name: Type check
      run: bun run type-check
    - name: Run unit tests
      run: bun run test:unit
    - name: Build
      run: bun run build
